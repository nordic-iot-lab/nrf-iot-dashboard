<svg width="1100" height="520" viewBox="0 0 1100 520" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">nRF dashboard data flow</title>
  <desc id="desc">MQTT, CoAP, HTTP ingest, and REST pull data are normalized into node snapshots, history, GPS map markers, and dashboard cards.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1100" y2="520" gradientUnits="userSpaceOnUse">
      <stop stop-color="#11352F"/>
      <stop offset="1" stop-color="#E19A38"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="14" flood-color="#00131A" flood-opacity="0.24"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2 2L10 6L2 10" stroke="#F7C948" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <rect width="1100" height="520" rx="28" fill="url(#bg)"/>
  <text x="60" y="72" fill="#FFFFFF" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="36" font-weight="800">nRF IoT Dashboard</text>
  <text x="62" y="108" fill="#EFF9E8" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="18">Unified visibility for MQTT, CoAP, REST, history, and GNSS location</text>
  <g filter="url(#shadow)">
    <rect x="62" y="164" width="240" height="244" rx="24" fill="#F9FFFB"/>
    <text x="96" y="215" fill="#173A33" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="24" font-weight="800">Inputs</text>
    <text x="96" y="257" fill="#41635D" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="16">MQTT subscriber</text>
    <text x="96" y="286" fill="#41635D" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="16">CoAP receiver</text>
    <text x="96" y="315" fill="#41635D" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="16">HTTP ingest</text>
    <text x="96" y="344" fill="#41635D" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="16">REST puller</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="430" y="164" width="240" height="244" rx="24" fill="#F9FFFB"/>
    <text x="464" y="215" fill="#173A33" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="24" font-weight="800">Normalizer</text>
    <text x="464" y="257" fill="#41635D" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="16">nodeId aliases</text>
    <text x="464" y="286" fill="#41635D" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="16">temperature aliases</text>
    <text x="464" y="315" fill="#41635D" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="16">battery aliases</text>
    <text x="464" y="344" fill="#41635D" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="16">GPS aliases</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="798" y="164" width="240" height="244" rx="24" fill="#F9FFFB"/>
    <text x="832" y="215" fill="#173A33" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="24" font-weight="800">Dashboard</text>
    <rect x="832" y="244" width="172" height="92" rx="18" fill="#E8F6EF" stroke="#BDD8CE"/>
    <circle cx="874" cy="290" r="25" fill="#1E7469"/>
    <path d="M874 273C862 273 854 282 854 292C854 308 874 320 874 320C874 320 894 308 894 292C894 282 886 273 874 273Z" fill="#F7C948"/>
    <circle cx="874" cy="292" r="6" fill="#1E7469"/>
    <rect x="915" y="269" width="68" height="9" rx="4.5" fill="#99C6B8"/>
    <rect x="915" y="292" width="50" height="9" rx="4.5" fill="#99C6B8"/>
    <rect x="832" y="360" width="172" height="14" rx="7" fill="#99C6B8"/>
  </g>
  <path d="M318 286H414" stroke="#F7C948" stroke-width="6" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M686 286H782" stroke="#F7C948" stroke-width="6" stroke-linecap="round" marker-end="url(#arrow)"/>
</svg>

